apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitoring-dashboard
  labels:
    app: monitoring-dashboard
    version: '1.0'
spec:
  replicas: 2                  # 2 copies for high availability
  selector:
    matchLabels:
      app: monitoring-dashboard
  template:
    metadata:
      labels:
        app: monitoring-dashboard
    spec:
      containers:
      - name: dashboard
        image: monitoring-dashboard:latest
        imagePullPolicy: Never  # Use local Minikube image
        ports:
        - containerPort: 5000
        env:
        - name: FLASK_ENV
          value: 'production'
        resources:
          requests:
            memory: '128Mi'
            cpu: '100m'
          limits:
            memory: '256Mi'
            cpu: '500m'
        livenessProbe:         # K8s checks if app is alive
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
